on:
  push:
    branches:
      - release

name: Build Memno App

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v2

      - name: Setup JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Flutter clean
        run: flutter clean

      - name: Getting Dependencies
        run: flutter pub upgrade

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          VERSION_CODE=$(echo $VERSION | cut -d'+' -f2)
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Decode keystore from GitHub Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties


      - name: Building signed APK 
        run: flutter build apk --release --split-per-abi

      - name: Rename APK files
        run: |
          cd build/app/outputs/apk/release
          mv app-armeabi-v7a-release.apk memno-armeabi-v7a-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}.apk
          mv app-arm64-v8a-release.apk memno-arm64-v8a-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}.apk
          mv app-x86_64-release.apk memno-x86_64-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}.apk

      - name: Upload APK
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/memno-armeabi-v7a-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}.apk,build/app/outputs/apk/release/memno-arm64-v8a-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}.apk,build/app/outputs/apk/release/memno-x86_64-${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}.apk"
          tag: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.version_code }}
          name: Memno v${{ steps.version.outputs.version_name }}
          token: ${{ secrets.MEMNO_TOKEN }}
